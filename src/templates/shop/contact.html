{% extends "base.html" %}

{% block content %}

<section class="contact-section">
    <div class="container">

        <div class="contact-header">
            <h1>Contact us</h1>
            <p>Have a question, a problem, or just want to say hello? Send us a message.</p>
        </div>

        <div class="contact-grid">

            <div class="contact-info-card">
                <h2>Get in touch</h2>

                <div class="contact-info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>kalil.sacko.3@gmail.com</p>
                    </div>
                </div>

                <div class="contact-info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h4>Phone</h4>
                        <p>+49 15 75 32 58 216</p>
                    </div>
                </div>

                <div class="contact-info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h4>Location</h4>
                        <p>Bochum, Germany</p>
                    </div>
                </div>
            </div>

            <div class="contact-form-card">
                <h2>Send a message</h2>

                <form action="#" method="post">
                    <div class="form-group">
                        <label for="name">Your name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name">
                    </div>

                    <div class="form-group">
                        <label for="email">Your email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" placeholder="Message subject">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="Write your message here..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i>
                        Send message
                    </button>
                </form>
            </div>

        </div>

    </div>
</section>

{% endblock %}
