{% extends 'admin/base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow mb-4">

        <div class="card-header py-3">
            <h4 class="m-0 font-weight-bold text-primary">
                Add Order
            </h4>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="form-group">
                    <label for="customer_name">Customer Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="customer_name"
                        name="customer_name"
                        placeholder="Enter customer name"
                        required>
                </div>

                <div class="form-row">

                    <div class="form-group col-md-6">
                        <label for="product">Product</label>
                        <select class="form-control" id="product" name="product" required>
                            <option value="">Choose product...</option>
                            <option value="1">Wireless Headphones</option>
                            <option value="2">Smart Watch</option>
                            <option value="3">Gaming Mouse</option>
                            <option value="4">Laptop Backpack</option>
                            <option value="5">Mechanical Keyboard</option>
                        </select>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="quantity">Quantity</label>
                        <input
                            type="number"
                            class="form-control"
                            id="quantity"
                            name="quantity"
                            min="1"
                            value="1"
                            required>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group col-md-6">
                        <label for="total">Total Price</label>
                        <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            id="total"
                            name="total"
                            placeholder="0.00"
                            required>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="status">Status</label>
                        <select class="form-control" id="status" name="status" required>
                            <option value="Pending">Pending</option>
                            <option value="Processing">Processing</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>

                </div>

                <div class="form-group">
                    <label for="note">Order Note</label>
                    <textarea
                        class="form-control"
                        id="note"
                        name="note"
                        rows="4"
                        placeholder="Optional note about this order..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-shopping-cart mr-2"></i>
                    Add Order
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
