{% extends 'admin/base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Edit User</h1>

        <a href="{{ url_for('admin_user.user_list') }}"
           class="btn btn-secondary btn-sm shadow-sm">
            <i class="fas fa-arrow-left fa-sm text-white-50 mr-1"></i>
            Back to Users
        </a>
    </div>

    <div class="card shadow mb-4">

        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">
                Edit {{ user["username"] }}
            </h6>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="form-row">

                    <div class="form-group col-md-6">
                        <label for="first_name">First Name</label>
                        <input type="text"
                               class="form-control"
                               id="first_name"
                               name="first_name"
                               value="{{ user['first_name'] }}"
                               required>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="last_name">Last Name</label>
                        <input type="text"
                               class="form-control"
                               id="last_name"
                               name="last_name"
                               value="{{ user['last_name'] }}"
                               required>
                    </div>

                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           name="email"
                           value="{{ user['email'] }}"
                           required>
                </div>

                <div class="form-row">

                    <div class="form-group col-md-6">
                        <label for="role">Role</label>
                        <select class="form-control"
                                id="role"
                                name="role">
                            <option value="User"
                                {% if user["role"] == "User" %}selected{% endif %}>
                                User
                            </option>

                            <option value="Admin"
                                {% if user["role"] == "Admin" %}selected{% endif %}>
                                Admin
                            </option>
                        </select>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="status">Status</label>
                        <select class="form-control"
                                id="status"
                                name="status">
                            <option value="Active"
                                {% if user["status"] == "Active" %}selected{% endif %}>
                                Active
                            </option>

                            <option value="Blocked"
                                {% if user["status"] == "Blocked" %}selected{% endif %}>
                                Blocked
                            </option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save mr-1"></i>
                    Save Changes
                </button>

                <a href="{{ url_for('admin_user.detail_user', user_id=user['id']) }}"
                   class="btn btn-info">
                    <i class="fas fa-eye mr-1"></i>
                    View Details
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
