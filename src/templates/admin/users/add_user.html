{% extends 'admin/base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow mb-4">

        <div class="card-header py-3">
            <h4 class="m-0 font-weight-bold text-primary">
                Add User
            </h4>
        </div>

        <div class="card-body">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">

                            {{ message }}

                            <button type="button"
                                    class="close"
                                    data-dismiss="alert"
                                    aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>

                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">

                <div class="form-row">

                    <div class="form-group col-md-6">
                        <label for="first_name">First Name</label>

                        <input
                            type="text"
                            class="form-control"
                            id="first_name"
                            name="first_name"
                            placeholder="John"
                            required>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="last_name">Last Name</label>

                        <input
                            type="text"
                            class="form-control"
                            id="last_name"
                            name="last_name"
                            placeholder="Doe"
                            required>
                    </div>

                </div>

                <div class="form-group">

                    <label for="email">Email Address</label>

                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        placeholder="john@example.com"
                        required>

                </div>

                <div class="form-row">

                    <div class="form-group col-md-6">

                        <label for="password">Password</label>

                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            required>

                    </div>

                    <div class="form-group col-md-6">

                        <label for="repeat_password">
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            id="repeat_password"
                            name="repeat_password"
                            required>

                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group col-md-6">

                        <label for="role">Role</label>

                        <select
                            class="form-control"
                            id="role"
                            name="role">

                            <option value="User">
                                User
                            </option>

                            <option value="Moderator">
                                Moderator
                            </option>

                            <option value="Admin">
                                Admin
                            </option>

                        </select>

                    </div>

                    <div class="form-group col-md-6">

                        <label for="status">Status</label>

                        <select
                            class="form-control"
                            id="status"
                            name="status">

                            <option value="Active">
                                Active
                            </option>

                            <option value="Pending">
                                Pending
                            </option>

                            <option value="Blocked">
                                Blocked
                            </option>

                        </select>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary btn-block">

                    <i class="fas fa-user-plus mr-2"></i>
                    Create User

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
